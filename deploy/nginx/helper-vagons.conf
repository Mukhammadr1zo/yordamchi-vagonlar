# Nginx server bloki — helper-vagons.d-railway.uz -> Next.js ilova (127.0.0.1:3100)
#
# MUHIM: bu ALOHIDA fayl/blok. d-railway.uz (analitika platformasi) bloklariga TEGMAYDI.
#
# O'rnatish:
#   sudo cp deploy/nginx/helper-vagons.conf /etc/nginx/sites-available/helper-vagons.conf
#   sudo ln -s /etc/nginx/sites-available/helper-vagons.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS (certbot d-railway.uz uchun allaqachon o'rnatilgan bo'lsa shunchaki):
#   sudo certbot --nginx -d helper-vagons.d-railway.uz

server {
    listen 80;
    listen [::]:80;
    server_name helper-vagons.d-railway.uz;

    client_max_body_size 25m;          # Excel yuklash uchun

    access_log /var/log/nginx/helper-vagons.access.log;
    error_log  /var/log/nginx/helper-vagons.error.log;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        # Server action'lar (qo'shish/tahrir/o'chirish) va Auth.js uchun ZARUR:
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 300;
    }
}
