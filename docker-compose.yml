# Ko'rinmas vagonlar — ishlab chiqish (dev) uchun PostgreSQL + Adminer.
# Ishga tushirish:  docker compose up -d
# To'xtatish:       docker compose down
# Ma'lumot bilan:   docker compose down -v   (volume ham o'chadi)
#
# Adminer (DB ko'rish): http://localhost:8080
#   System=PostgreSQL, Server=db, User=vagon, Password=vagon, Database=vagon_db
#
# Production (o'z serverda) uchun: Dockerfile + docker-compose.prod.yml ga qarang.

services:
  db:
    image: postgres:16-alpine
    container_name: vagon_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vagon
      POSTGRES_PASSWORD: vagon
      POSTGRES_DB: vagon_db
      # UTF-8 + sortlash (kirill/lotin matn uchun)
      LANG: ru_RU.utf8
    ports:
      # Host 5434 — 5432/5433 boshqa loyihalar tomonidan band
      - "5434:5432"
    volumes:
      - vagon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vagon -d vagon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: vagon_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  vagon_pgdata:
